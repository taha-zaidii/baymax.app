services:
  - type: web
    name: baymax-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: MEM0_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_MODEL_FAST
        value: llama-3.1-8b-instant
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_db
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
